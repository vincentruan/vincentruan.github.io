# NexT Theme Configuration Override
# See: https://theme-next.js.org/docs/

# ---------------------------------------------------------------
# Theme Core Configuration Settings
# ---------------------------------------------------------------

# Site Information
site:
  author: vincentruan
  language: zh-CN

# Menu Settings
menu:
  home: / || fa fa-home
  about: /about/ || fa fa-user
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive
  #sitemap: /sitemap.xml || fa fa-sitemap
  #commonweal: /404/ || fa fa-heartbeat

# Sidebar Settings
sidebar:
  position: left

# Post Settings
post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: true
    another_day: true
  categories: true

# Post Wordcount
symbols_count_time:
  separated_meta: true
  item_text_post: true
  item_text_total: false

# Code Highlight
codeblock:
  theme:
    light: default
    dark: tomorrow-night-bright

# Related Popular Posts
related_posts:
  enable: true
  title:
  display_in_excerpt: false
  limit: 5
  date_format: YYYY-MM-DD

# MathJax
math:
  enable: true
  per_page: false
  engine: mathjax

# Local Search
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: false

# Tabs
tabs:
  enable: true
  transition:
    tabs: false
    labels: true
  border_radius: 0

# Motion
motion:
  enable: true
  async: false
  transition:
    post_block: fadeIn
    post_header: slideDownIn
    post_body: slideDownIn
    coll_header: slideLeftIn
    sidebar: slideUpIn

# Canvas Nest
canvas_nest:
  enable: true
  onmobile: true
  color: "0,0,255"
  opacity: 0.5
  zIndex: -1
  count: 99

# ---------------------------------------------------------------
# Third Party Plugins & Services Settings
# ---------------------------------------------------------------

# Comments
# Available values: disqus | disqusjs | livere | gitalk | utterances | isso
comments:
  active: utterances
  storage: true
  lazyload: false

# Utterances —— 基于 GitHub Issues,无需 client_secret
# https://github.com/utterance/utterances
# 前置条件:仓库 public 且开启 Issues(博客仓库默认满足)
utterances:
  enable: true
  repo: vincentruan/vincentruan.github.io # owner/repo
  # Available values: pathname | url | title | og:title
  issue_term: pathname
  # Available values: github-light | github-dark | preferred-color-scheme | github-dark-orange | icy-dark | dark-blue | photon-dark | boxy-light
  theme: preferred-color-scheme

# Mermaid
mermaid:
  enable: true
  version: "7.1.2"
  options:
    theme: default

# Flowchart
flowchart:
  enable: true

# Image zoom (click to enlarge) — applies to all post images
# https://fancyapps.com/fancybox/
fancybox: true
